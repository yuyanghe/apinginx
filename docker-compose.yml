services:
  # New-API 大模型网关（QuantumNous / one-api 系）。镜像与说明见 https://hub.docker.com/r/calciumion/new-api
  # 生产建议再配 MySQL + Redis，见官方文档；此处为可启动的最小示例（单容器 + 本地 /data）。
  new-api:
    image: calciumion/new-api:${NEW_API_TAG:-latest}
    restart: unless-stopped
    expose:
      - "3000"
    # 需要宿主机直连管理后台（例如 http://服务器IP:3000）时取消注释：
    # ports:
    #   - "${NEW_API_PORT:-3000}:3000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./new-api-data:/data

  nginx:
    build: .
    image: apinginx:latest
    depends_on:
      - new-api
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      APIS_UPSTREAM: ${APIS_UPSTREAM:-http://new-api:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${CERTS_MOUNT:-letsencrypt}:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ${CERTS_MOUNT:-letsencrypt}:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot

volumes:
  letsencrypt:
  certbot-webroot:
